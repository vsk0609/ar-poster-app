<!DOCTYPE html>
<html>
<head>
    <title>AR Poster App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body>

    <h1>AR Poster Viewer</h1>

    <p>Point your camera at a marker to see 3D content</p>
    <div class="title">AR Poster Demo</div>
    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    
    <a-marker type="pattern" url="marker.patt">
        <a-box position="0 0.5 0" color="green"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
        <a-text value="AR Poster Demo" position="0 1.2 0" align="center" color="red"></a-text>
    </a-marker>

    <a-entity camera></a-entity>

    </a-scene>
    <script src="script.js"></script>
</body>
</html>
